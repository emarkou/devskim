name: Demo GIF

on:
  push:
    branches: [main]
    paths: [demo.tape]
    tags-ignore: ["*"]

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg
          curl -fsSL https://github.com/tsl0922/ttyd/releases/download/1.7.3/ttyd.x86_64 \
            -o ttyd && sudo install -m755 ttyd /usr/local/bin/ttyd
          VHS_VERSION=$(curl -s https://api.github.com/repos/charmbracelet/vhs/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'][1:])")
          curl -fsSL "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_amd64.deb" \
            -o vhs.deb && sudo dpkg -i vhs.deb

      - name: Install grokfeed
        run: uv tool install .

      - name: Record demo
        run: vhs demo.tape

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update demo GIF"
          file_pattern: "demo.gif"
